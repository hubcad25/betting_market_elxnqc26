name: Supabase Keep-Alive

on:
  schedule:
    # S'exécute à 00:00, le lundi et le jeudi
    - cron: '0 0 * * 1,4'
  workflow_dispatch: # Permet de le lancer manuellement pour tester

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase API
        run: |
          curl -I "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}/rest/v1/" \
          -H "apikey: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}"
